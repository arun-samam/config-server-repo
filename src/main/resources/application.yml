server:
  port: ${CONFIG_PORT:8888}

spring:
  application:
    name: config-server
  profiles:
    active: native
  cloud:
    config:
      server:
        native:
          search-locations: classpath:/config

eureka:
  client:
    service-url:
      defaultZone: http://${eureka-server:localhost}:${EUREKA_PORT:8761}/eureka/
